version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: bms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bms_network

  backend:
    build: ./backend
    container_name: bms_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=book_management
      - JWT_SECRET_KEY=change-this-secret-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
    depends_on:
      - mongodb
    networks:
      - bms_network

  frontend:
    build: ./frontend
    container_name: bms_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - bms_network

volumes:
  mongodb_data:

networks:
  bms_network:
    driver: bridge
